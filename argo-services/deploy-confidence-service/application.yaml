apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deploy-confidence
  namespace: argo
spec:
  destination:
    namespace: deploy-confidence
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: git@github.com:MohanadAbugharbia/homelab.git
    path: argo-services/deploy-confidence-service
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
