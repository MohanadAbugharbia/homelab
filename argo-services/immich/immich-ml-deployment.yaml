apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: immich-ml
  name: immich-ml
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-ml
  template:
    metadata:
      labels:
        app: immich-ml
    spec:
      containers:
      - image: immich-ml
        imagePullPolicy: IfNotPresent
        name: immich-ml
        ports:
          - name: http
            containerPort: 3003
            protocol: TCP
        env:
          - name: DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: immich-db-cred
                key: host
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: immich-db-cred
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-db-cred
                key: password
          - name: DB_DATABASE_NAME
            valueFrom:
              secretKeyRef:
                name: immich-db-cred
                key: dbname
          - name: REDIS_HOSTNAME
            value: valkey
        volumeMounts:
          - mountPath: /cache
            name: model-cache
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 60
        securityContext:
          capabilities:
            drop:
              - ALL
          privileged: false
          runAsNonRoot: true
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-model-cache
      securityContext:
        runAsNonRoot: true
