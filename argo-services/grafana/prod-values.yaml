
ingress:
  enabled: true
  ingressClassName: tailscale
  hosts:
    - grafana
  tls:
    - hosts:
      - grafana
      secretName: grafana-tls

admin:
  existingSecret: "grafana-admin-user"
  userKey: user
  passwordKey: password

persistence:
  enabled: true
  size: 10Gi
  storageClassName: local-path

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus:9090
        isDefault: true
        httpMethod: POST
